  <style>
    .milestone-section { margin-bottom: 4rem; }
    .milestone-header {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--border);
    }
    .milestone-number {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      color: var(--red);
      line-height: 1;
      min-width: 3.5rem;
    }
    .milestone-info h2 { font-size: 1.6rem; margin-bottom: 0.4rem; }
    .milestone-info p { color: var(--grey); font-size: 0.95rem; }
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .topic-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: box-shadow 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .topic-card:hover {
      box-shadow: 0 6px 24px rgba(10,49,97,0.12);
      transform: translateY(-2px);
      color: inherit;
    }
    .topic-card.locked {
      opacity: 0.55;
      pointer-events: none;
      cursor: default;
    }
    .topic-card--passed {
      background: #f0fdf4;
      border-color: #16a34a;
    }
    .topic-card--passed:hover {
      box-shadow: 0 6px 24px rgba(22,163,74,0.15);
    }
    .topic-card--preview {
      border-color: #7b2d8b;
      background: #fdf4ff;
    }
    .topic-card--preview:hover {
      box-shadow: 0 6px 24px rgba(123,45,139,0.15);
    }
    .topic-card--signin {
      opacity: 0.6;
    }
    .topic-card--signin .topic-desc {
      filter: blur(2px);
      user-select: none;
    }
    .topic-card .topic-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--blue);
    }
    .topic-card .topic-desc {
      font-size: 0.9rem;
      color: var(--grey);
      line-height: 1.55;
    }
    .topic-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.5rem;
    }
    .topic-status {
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .status-unlocked { color: #16a34a; }
    .status-locked { color: var(--grey); }
    .status-passed { color: var(--blue); }
    .milestone-test-banner {
      background: var(--blue);
      color: var(--white);
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .milestone-test-banner h4 { color: var(--white); font-size: 1rem; margin-bottom: 0.25rem; }
    .milestone-test-banner p { color: rgba(255,255,255,0.7); font-size: 0.88rem; }
    .learn-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 3rem;
      padding: 4rem 0;
    }
    .learn-sidebar-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      position: sticky;
      top: 90px;
    }
    .learn-sidebar-card h3 { font-size: 1.1rem; margin-bottom: 1.25rem; }
    .progress-stat { margin-bottom: 1.25rem; }
    .progress-stat-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      color: var(--grey);
      margin-bottom: 0.4rem;
    }
    @media (max-width: 900px) {
      .learn-layout { grid-template-columns: 1fr; }
      .learn-sidebar-card { position: static; }
    }
    .sidebar-skeleton { }
    .skel-line {
      background: linear-gradient(90deg, var(--border) 25%, #f0ece6 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px;
      display: block;
    }
  </style>
