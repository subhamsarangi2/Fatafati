<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>নতুন পাসওয়ার্ড সেট করুন – ফাটাফাটি</title>
  <link rel="icon" href="/assets/icons/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .reset-wrap {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .reset-card {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 3rem;
      width: 100%;
      max-width: 440px;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 22px), calc(100% - 22px) 100%, 0 100%);
    }
    .reset-card h1 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

<nav class="navbar" role="navigation">
  <div class="container">
    <a href="/" class="logo" aria-label="Fatafati home">
      <img src="/assets/logo.png" alt="Fatafati" class="logo-img" />
    </a>
  </div>
</nav>

<main>
  <div class="reset-wrap">
    <div class="reset-card">
      <h1>নতুন পাসওয়ার্ড সেট করুন</h1>
      <p class="text-muted mb-3">আপনার নতুন পাসওয়ার্ড লিখুন।</p>

      <div id="reset-alert"></div>

      <div id="reset-form">
        <div class="form-group">
          <label class="form-label" for="new-password">নতুন পাসওয়ার্ড</label>
          <div class="password-wrapper">
            <input type="password" id="new-password" class="form-control" placeholder="কমপক্ষে ৮ অক্ষর" />
            <button type="button" class="password-toggle" aria-label="Toggle password visibility" data-target="new-password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">পাসওয়ার্ড নিশ্চিত করুন</label>
          <div class="password-wrapper">
            <input type="password" id="confirm-password" class="form-control" placeholder="আবার লিখুন" />
            <button type="button" class="password-toggle" aria-label="Toggle password visibility" data-target="confirm-password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <button class="btn btn-primary w-100" id="save-btn">
          <span class="btn-text"><i class="fa-solid fa-lock"></i> পাসওয়ার্ড সেভ করুন</span>
          <span class="btn-spinner" style="display:none;"><i class="fa-solid fa-spinner fa-spin"></i></span>
        </button>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/supabase-client.js"></script>
<script>
  // Password toggles
  document.querySelectorAll('.password-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });
  });

  function showAlert(msg, type = 'error') {
    document.getElementById('reset-alert').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }

  function setLoading(isLoading) {
    const btn = document.getElementById('save-btn');
    btn.disabled = isLoading;
    btn.querySelector('.btn-text').style.display = isLoading ? 'none' : 'inline-flex';
    btn.querySelector('.btn-spinner').style.display = isLoading ? 'inline-flex' : 'none';
  }

  // Supabase picks up the token from the URL hash automatically on load
  supabaseClient.auth.onAuthStateChange(async (event) => {
    if (event === 'PASSWORD_RECOVERY') {
      // Token is valid — user can now set a new password
      document.getElementById('reset-form').style.display = 'block';
    }
  });

  document.getElementById('save-btn').addEventListener('click', async () => {
    const password = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (!password || !confirm) return showAlert('সব ঘর পূরণ করুন।');
    if (password.length < 8) return showAlert('পাসওয়ার্ড কমপক্ষে ৮ অক্ষরের হতে হবে।');
    if (password !== confirm) return showAlert('পাসওয়ার্ড দুটি মিলছে না।');

    try {
      setLoading(true);
      const { error } = await supabaseClient.auth.updateUser({ password });
      if (error) throw error;
      showAlert('পাসওয়ার্ড সফলভাবে পরিবর্তন হয়েছে! রিডাইরেক্ট হচ্ছে...', 'success');
      document.getElementById('reset-form').style.display = 'none';
      setTimeout(() => { window.location.href = '/'; }, 2000);
    } catch (err) {
      showAlert(err.message || 'কিছু একটা সমস্যা হয়েছে। আবার চেষ্টা করুন।');
    } finally {
      setLoading(false);
    }
  });
</script>
</body>
</html>
