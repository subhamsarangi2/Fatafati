<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Fatafati</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<nav class="navbar">
  <div class="container">
    <a href="" class="logo">
      <img src="assets/logo.png" alt="Fatafati" class="logo-img" />
    </a>
  </div>
</nav>
<main>
  <div class="container" style="padding:8rem 2rem;text-align:center;">
    <i class="fa-solid fa-wifi-slash" style="font-size:3.5rem;color:var(--border);margin-bottom:2rem;"></i>
    <h1 style="font-size:2rem;margin-bottom:1rem;">You're offline</h1>
    <p style="color:var(--grey);max-width:400px;margin:0 auto 2.5rem;">No internet connection detected. Check your network and try again.</p>
    <button onclick="window.location.reload()" class="btn btn-primary">
      <i class="fa-solid fa-rotate-right"></i> Try Again
    </button>
  </div>
</main>
</body>
</html>
